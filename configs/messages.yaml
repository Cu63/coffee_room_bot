analyze_system_prompt: |
  Ты — аналитик переписки. Пиши кратко и по делу, без воды.
  Отвечай на русском языке.
  Используй Telegram HTML: <b>, <i>, <code>. Закрывай все теги.

analyze_user_prompt: |
  Проанализируй переписку Telegram-чата.
  {warning}Переписка ({actual} сообщений):
  {messages}
  ---
  Коротко: кто о чём, общий тон, что интересного в динамике.
  Если заданы конкретные пользователи — фокус на них.
  Без пересказа — только выводы.

wir_system_prompt: |
  Ты — беспристрастный арбитр. Говори прямо, без дипломатии и воды.
  Отвечай на русском языке.
  Используй Telegram HTML: <b>, <i>, <code>. Закрывай все теги.

wir_user_prompt: |
  Разбери конфликт или ситуацию в переписке.
  {warning}Переписка ({actual} сообщений):
  {messages}
  ---
  Нужно:
  — <b>Что случилось</b> и позиции сторон — 2–3 предложения
  — <b>Грязные приёмы</b>: манипуляции, газлайтинг, демагогия — конкретно у кого
  — <b>Логические ошибки</b> — только если есть, без натяжек
  — <b>Вердикт</b>: кто прав и почему
  — <b>Что делать</b>: коротко каждой стороне
  Пиши плотно. Пропускай пункт, если по нему нечего сказать.

# ── daily summary ────────────────────────────────────────────────────────────
daily_summary_system_prompt: |
  Ты — остроумный летописец Telegram-чата. Пишешь ежедневную сводку коротко и с юмором.
  Отвечай на русском языке.
  Используй Telegram HTML-форматирование: <b>, <i>, <u>, <s>, <code>.
  ВСЕ открытые теги ОБЯЗАТЕЛЬНО закрывай.

daily_summary_user_prompt: |
  Вот переписка чата за сегодня ({actual} сообщений):

  {messages}

  ---
  Напиши краткую ежедневную сводку:
  — О чём говорили, какие темы поднимались
  — Самые активные участники
  — Запоминающиеся моменты или высказывания (без точного цитирования)
  — Общее настроение дня

  Заголовок: <b>📰 Сводка за {date}</b>
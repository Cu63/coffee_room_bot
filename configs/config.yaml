score:
  singular: "кирчик"
  plural_few: "кирчика"       # для 2–4
  plural_many: "кирчиков"     # для 0, 5+
  icon: "⭐"

reactions:
  "❤️‍🔥": +3
  "🔥": +3
  "❤️": +2
  "👍": +1
  "😁": +1
  "👎": -1
  "💩": -2
  "🤡": -3

self_reaction_allowed: false

limits:
  daily_negative_given: 10      # сколько отрицательных реакций А может поставить в сутки (глобальный лимит)
  daily_positive_per_target: 20 # сколько положительных реакций А может поставить одному Б в сутки
  daily_score_received: 50      # сколько кирчиков Б может получить в сутки (в одном чате)
  max_message_age_hours: 36     # реакции на сообщения старше N часов игнорируются

history:
  retention_days: 3             # сколько дней хранить историю событий

admin:
  prefix: "coffee"
  users:
    - "shared_mutex"
    - "ju57_4_cu63"
    - "meganjard"


mute:
  cost_per_minute: 3                # стоимость 1 минуты мута в баллах
  min_minutes: 1
  max_minutes: 15                   # максимальная длительность одного мута
  daily_limit: 3                    # сколько мутов в сутки может выдать один пользователь
  target_cooldown_hours: 2          # кулдаун между мутами одного и того же человека
  selfmute_min_minutes: 1           # лимиты /selfmute
  selfmute_max_minutes: 1440        # 24 часа
  protection_cost: 200              # баллов за одно использование /protect
  protection_duration_hours: 24     # сколько часов даёт /protect
  unmute_multiplier: 1.5            # множитель стоимости /unmute (оставшиеся мин × cost_per_minute × множитель)

tag:
  cost_self: 50                 # сменить тег себе
  cost_member: 100              # сменить тег обычному участнику
  cost_admin: 200               # сменить тег админу/модератору
  cost_owner: 500               # сменить тег создателю чата
  max_length: 16                # максимальная длина тега

blackjack:
  min_bet: 1
  max_bet: 50               # макс. ставка ~1/5 недельного заработка топ-игрока
  max_games_per_window: 5      # максимум игр в окне
  window_hours: 1              # размер временного окна в часах
  game_timeout_seconds: 60     # через сколько секунд незавершённая игра закрывается с возвратом ставки

slots:
  min_bet: 1
  max_bet: 25               # джекпот (×30) = 750 — событие, но не ломает экономику
  cooldown_minutes: 60      # кулдаун между спинами одного пользователя (в минутах)

dice:
  min_bet: 1
  max_bet: 1000
  min_wait_seconds: 10         # минимальное время сбора участников
  max_wait_seconds: 900        # максимальное время сбора (15 минут)

llm:
  model: "gemini-2.5-flash-lite"
  base_url: "https://api.aitunnel.ru/v1"
  max_output_tokens: 4096       # лимит токенов на ответ
  daily_limit_per_user: 4       # запросов /llm + /search на пользователя в сутки
  search_max_results: 7         # сколько результатов поиска парсить


burst:
  enabled: true
  messages_required: 8          # сколько сообщений нужно
  window_minutes: 20            # за какой период (скользящее окно)
  min_length: 15                # минимальная длина сообщения (символов)
  reward: 15                    # награда в кирчиках
  cooldown_hours: 4             # кулдаун после срабатывания

spark:
  enabled: true
  unique_responders: 4          # сколько разных людей должны написать после сообщения
  window_minutes: 10            # за какой период
  reward: 10                    # награда автору-зачинщику
  cooldown_hours: 6             # кулдаун

reply_chain:
  enabled: true
  replies_required: 6           # сколько чередующихся реплаев нужно (A→B→A→B→...)
  window_minutes: 15            # за какой период
  reward: 8                     # награда каждому из двоих
  cooldown_hours: 4             # кулдаун на пару

auto_react:
  enabled: true
  probability: 0.05   # 5% — каждое 20-е сообщение в среднем
  positive_only: true

# Системные интервалы и параметры
system:
  cleanup_interval_hours: 6       # как часто удалять устаревшие события
  unmute_check_interval_seconds: 60   # как часто проверять истёкшие муты
  auto_delete_seconds: 120        # через сколько секунд удалять служебные сообщения
  history_page_size: 30           # строк на страницу в /history

renew:
  cost: 100           # стоимость одного /renew
  daily_limit: 2      # сколько раз в сутки можно использовать /renew

# Баг-репорты: кому отправлять в личку
# Каждый получатель должен предварительно написать боту в личку
bug:
  recipients:
    - 758647978   # замените на реальные Telegram user_id
    - 450588708

wordgame:
  min_bet: 0
  max_bet: 200
  min_duration_seconds: 180   # 3 минуты минимум
  max_duration_seconds: 3600  # 1 час максимум
  attempt_cost: 1             # баллов за неудачную попытку
  min_word_length: 2
  max_word_length: 16
  max_games_per_window: 3     # макс. игр за окно
  game_window_hours: 4        # окно лимита в часах

logging:
  level: "INFO"
  human_readable_logs: false

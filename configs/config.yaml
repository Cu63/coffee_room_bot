score:
  singular: "кирчик"
  plural_few: "кирчика"       # для 2–4
  plural_many: "кирчиков"     # для 0, 5+
  icon: "⭐"

reactions:
  "❤️‍🔥": +3
  "🔥": +3
  "❤️": +2
  "👍": +1
  "😁": +1
  "👎": -1
  "💩": -2
  "🤡": -3

self_reaction_allowed: false

limits:
  daily_negative_given: 10      # сколько отрицательных реакций А может поставить в сутки (глобальный лимит)
  daily_positive_per_target: 20 # сколько положительных реакций А может поставить одному Б в сутки
  daily_score_received: 50      # сколько кирчиков Б может получить в сутки (в одном чате)
  max_message_age_hours: 36     # реакции на сообщения старше N часов игнорируются

history:
  retention_days: 3             # сколько дней хранить историю событий

admin:
  prefix: "coffee"
  users:
    - "shared_mutex"
    - "ju57_4_cu63"
    - "meganjard"


mute:
  cost_per_minute: 3                # стоимость 1 минуты мута в баллах
  min_minutes: 1
  max_minutes: 15                   # максимальная длительность одного мута
  daily_limit: 0                    # 0 = без лимита; сколько мутов в сутки может выдать один пользователь
  target_cooldown_hours: 0          # 0 = без кулдауна; кулдаун между мутами одного и того же человека
  selfmute_min_minutes: 1           # лимиты /selfmute
  selfmute_max_minutes: 1440        # 24 часа
  protection_cost: 200              # баллов за одно использование /protect
  protection_duration_hours: 24     # сколько часов даёт /protect
  unmute_multiplier: 1.5            # множитель стоимости /unmute (оставшиеся мин × cost_per_minute × множитель)

tag:
  cost_self: 50                 # сменить тег себе
  cost_member: 100              # сменить тег обычному участнику
  cost_admin: 200               # сменить тег админу/модератору
  cost_owner: 500               # сменить тег создателю чата
  max_length: 16                # максимальная длина тега

blackjack:
  enabled: true                   # дуэльный блекджек
  min_bet: 1
  max_bet: 100

slots:
  enabled: true                  # false — полностью отключить /slots
  min_bet: 1
  max_bet: 25               # джекпот (×30) = 750 — событие, но не ломает экономику
  cooldown_minutes: 1440    # кулдаун между спинами одного пользователя (в минутах)

dice:
  enabled: true                  # false — полностью отключить /dice
  min_bet: 1
  max_bet: 100
  min_wait_seconds: 10         # минимальное время сбора участников
  max_wait_seconds: 900        # максимальное время сбора (15 минут)

llm:
  model: "gemini-2.5-flash-lite"
  base_url: "https://api.aitunnel.ru/v1"
  max_output_tokens: 4096       # лимит токенов на ответ
  daily_limit_per_user: 4       # запросов /llm + /search на пользователя в сутки
  search_max_results: 7         # сколько результатов поиска парсить


burst:
  enabled: true
  messages_required: 8          # сколько сообщений нужно
  window_minutes: 20            # за какой период (скользящее окно)
  min_length: 15                # минимальная длина сообщения (символов)
  reward: 15                    # награда в кирчиках
  cooldown_hours: 4             # кулдаун после срабатывания

spark:
  enabled: true
  unique_responders: 4          # сколько разных людей должны написать после сообщения
  window_minutes: 10            # за какой период
  reward: 10                    # награда автору-зачинщику
  cooldown_hours: 6             # кулдаун

reply_chain:
  enabled: true
  replies_required: 6           # сколько чередующихся реплаев нужно (A→B→A→B→...)
  window_minutes: 15            # за какой период
  reward: 8                     # награда каждому из двоих
  cooldown_hours: 4             # кулдаун на пару

xp:
  enabled: true
  rewards:
    burst: 30             # XP за burst-активность
    spark: 20             # XP за разжигание дискуссии (spark)
    chain: 15             # XP за чередующийся диалог (reply chain)
  levels:
    xp_per_level: 500     # XP на каждый уровень (линейная шкала)
    max_level: 100        # максимальный уровень

auto_react:
  enabled: true
  probability: 0.05   # 5% — каждое 20-е сообщение в среднем
  positive_only: true

# Системные интервалы и параметры
system:
  cleanup_interval_hours: 6       # как часто удалять устаревшие события
  unmute_check_interval_seconds: 60   # как часто проверять истёкшие муты
  auto_delete_seconds: 120        # через сколько секунд удалять служебные сообщения
  history_page_size: 30           # строк на страницу в /history

renew:
  cost: 100           # стоимость одного /renew
  daily_limit: 2      # сколько раз в сутки можно использовать /renew

# Баг-репорты: кому отправлять в личку
# Каждый получатель должен предварительно написать боту в личку
bug:
  recipients:
    - 758647978   # замените на реальные Telegram user_id
    - 450588708

wordgame:
  min_bet: 0
  max_bet: 200
  min_duration_seconds: 180   # 3 минуты минимум
  max_duration_seconds: 3600  # 1 час максимум
  attempt_cost: 1             # баллов за неудачную попытку
  min_word_length: 2
  max_word_length: 16
  max_games_per_window: 3     # макс. игр за окно
  game_window_hours: 4        # окно лимита в часах

rwordgame:
  max_bet: 15                 # лимит ставки для /rword (0–N)
  min_word_length: 2          # минимальная длина случайного слова
  max_word_length: 21         # максимальная длина случайного слова
  words_file: "configs/words_ru.txt"  # путь к файлу словаря
  max_games_per_window: 5     # макс. игр за окно
  game_window_hours: 1        # окно лимита в часах
  cooldown_minutes: 15        # задержка между играми /rword (в минутах)

tictactoe:
  enabled: true
  min_bet: 1
  max_bet: 100

lot:
  enabled: true
  min_duration_sec: 60        # минимальная длительность (секунды)
  max_duration_sec: 86400     # максимальная длительность (24 часа)
  min_start_price: 0          # минимальная стартовая цена
  max_start_price: 100000     # максимальная стартовая цена
  bid_steps: [5, 10, 25, 50, 100]  # кнопки шагов ставки
  delete_delay: 120           # секунд до удаления итогового сообщения

anagram:
  enabled: true
  min_bet: 1                    # минимальная ставка (/anagram <ставка>)
  max_bet: 10                  # максимальная ставка
  min_word_length: 7            # минимальная длина загадываемого слова
  max_word_length: 20           # максимальная длина загадываемого слова
  attempt_cost: 3               # баллов за неверную попытку (0 = бесплатно)
  answer_timeout_seconds: 300   # секунд на угадывание (5 минут)
  games_per_hour: 0         # авто-игры в час (0 = авто отключено)
  auto_bet: 10                  # приз в авто-играх (из баланса бота)
  cooldown_minutes: 15          # задержка между играми /anagram (в минутах)

buyop:
  cost: 1100                    # стоимость /buyop (титул без прав)
  tag: "налудил"                # кастомный тег (пусто = без тега)

idea:
  cost: 0                       # стоимость создания идеи (0 = бесплатно)
  votes_threshold: 5            # голосов 👍 для уведомления админов
  vote_ttl_hours: 72            # сколько часов принимать голоса

selfban:
  min_minutes: 30               # минимальная длительность самозапрета на игры
  max_minutes: 10080            # максимальная (7 дней)

logging:
  level: "INFO"
  human_readable_logs: false

news:
  hourly_limit: 2          # максимум вызовов /news для не-админа в час (0 = без лимита)
  use_llm: false            # фильтровать кандидатов через LLM (IT + позитив)
  translate: true          # переводить иностранные новости на русский через LLM
  feeds:
    # ── Русскоязычные ──────────────────────────────────────────────
    - name: "Habr"
      url: "https://habr.com/ru/rss/articles/all/?fl=ru"
    - name: "Хакер"
      url: "https://xakep.ru/feed/"
    - name: "3DNews"
      url: "https://3dnews.ru/news/rss/"
    - name: "iXBT"
      url: "https://www.ixbt.com/export/news.rss"
    # ── Англоязычные ───────────────────────────────────────────────
    - name: "TechCrunch"
      url: "https://techcrunch.com/feed/"
    - name: "The Verge"
      url: "https://www.theverge.com/rss/index.xml"
    - name: "Ars Technica"
      url: "http://feeds.arstechnica.com/arstechnica/index"
    - name: "VentureBeat"
      url: "https://venturebeat.com/feed/"
    - name: "Wired"
      url: "https://www.wired.com/feed/rss"
    - name: "MIT Technology Review"
      url: "https://www.technologyreview.com/feed/"
    - name: "Hacker News"
      url: "https://hnrss.org/frontpage"

analyze:
  model: "gpt-4.1-nano"
  base_url: "https://api.proxyapi.ru/openai/v1"
  max_output_tokens: 4096        # лимит токенов на ответ
  max_messages: 500              # максимум N для /analyze
  wir_default_messages: 300      # N по умолчанию для /wir
  wir_max_messages: 1000         # максимум N для /wir
  # ── Лимиты ──────────────────────────────────────────────────────
  daily_input_token_limit: 50000  # max input-токенов на юзера/день (0 = без лимита)
  max_history_hours: 32           # максимальная глубина истории (часы)

daily_summary:
  enabled: true
  time: "22:00"              # время отправки (HH:MM, MSK)
  max_messages: 10000         # потолок на случай очень активного чата

daily_leaderboard:
  enabled: true
  time: "23:00"                  # время подведения итогов (HH:MM, MSK)
  bonus_messages: 50             # бонус за наибольшее кол-во сообщений
  bonus_reactions_given: 50      # бонус за наибольшее кол-во данных реакций
  bonus_reactions_received: 50   # бонус за наибольшее кол-во собранных реакций
  bonus_replies: 50              # бонус за наибольшее кол-во реплаев
  bonus_ttt_wins: 50             # бонус за наибольшее кол-во побед в TTT
  bonus_wordgame_wins: 50        # бонус за наибольшее кол-во побед в word/rword

chatmode:
  enabled: true
  default_minutes: 5             # минуты по умолчанию если не указаны
  silence:
    cost_per_minute: 10          # стоимость 1 минуты режима тишины
    max_minutes: 1440            # максимум 24 часа
  gif:
    cost_per_minute: 5           # стоимость 1 минуты режима гифок
    max_minutes: 1440            # максимум 24 часа

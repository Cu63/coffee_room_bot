# ── Справка бота (/help) ─────────────────────────────────────────────────────
# Кнопки главного меню: список рядов, каждый ряд — список кнопок {key, label}.
# key должен совпадать с ключом в sections ниже.

menu_title: "{icon} <b>Справка по боту</b>\n\nВыбери раздел, чтобы узнать подробнее:"
back_button: "⬅️ Назад"

menu_buttons:
  - - key: reactions
      label: "📊 Реакции"
    - key: limits
      label: "⚙️ Лимиты"
  - - key: mute
      label: "🔇 Мут"
    - key: tag
      label: "🏷 Тег"
  - - key: bj
      label: "🃏 Блекджек"
    - key: wordgame
      label: "🔤 Угадайка"
  - - key: ttt
      label: "🎮 Крестики-нолики"
    - key: dice
      label: "🎲 Кубики и слоты"
  - - key: poker
      label: "🎰 Кочерга"
    - key: chatmode
      label: "🔒 Режимы чата"
  - - key: ai
      label: "🤖 AI-команды"
  - - key: commands
      label: "📋 Команды"
    - key: admin
      label: "🛡 Для админов"
  - - key: tracker
      label: "📡 Трекер"

# Тексты разделов. Поддерживают Telegram HTML.
# Плейсхолдеры заполняются из config.yaml при рендере: {cost_per_minute}, {min_minutes} и т.д.
# Полный список плейсхолдеров см. в bot/presentation/handlers/help_renderer.py
sections:
  reactions:
    header: "📊 <b>Реакции</b>"
    intro: |
      Ставь реакции на сообщения — автор получает или теряет баллы.
    footer: |
      Реакции на свои сообщения не засчитываются.
      Негативные реакции от участников с отрицательным счётом игнорируются.

  limits:
    header: "⚙️ <b>Лимиты</b>"
    rows:
      - "<b>Реакции:</b>"
      - "  Положительных одному участнику в сутки: {daily_reactions_given}"
      - "  Макс. баллов получателю в сутки: {daily_score_received}"
      - "  Возраст сообщения: не старше {max_message_age_hours} ч."
      - "  История хранится: {retention_days} дн."
      - ""
      - "<b>Слоты:</b>"
      - "  Кулдаун между спинами: {slots_cooldown} мин."
      - ""
      - "  /renew — сбросить лимиты за {renew_cost} (до {renew_limit} раз/сутки)"

  mute:
    header: "🔇 <b>Мут</b>"
    cost_row: "  Стоимость: {cost_per_minute} / мин"
    range_row: "  Длительность: {min_minutes}–{max_minutes} мин"
    random_row: "  /mute random &lt;время&gt; — замутить случайного участника"
    no_debt: "  Баллы в долг не даются"
    selfmute_header: "<b>Самомут (бесплатно):</b>"
    selfmute_row: "  /selfmute — замутить себя ({selfmute_min}–{selfmute_max} мин)"
    protect_header: "<b>Защита от мута:</b>"
    unmute_header: "<b>Досрочное снятие мута:</b>"
    unmute_rows:
      - "  /unmute @user — снять мут с пользователя за кирчики"
      - "  Цена: оставшиеся минуты × {cost_per_minute} × {unmute_multiplier}"
      - "  Чем меньше осталось — тем дешевле"
    protect_header: "<b>Защита от мута:</b>"
    protect_rows:
      - "  /protect — купить защиту на {protection_hours} ч. за {protection_cost} б."
      - "  /unprotect — снять свою защиту досрочно"
      - "  Защита блокирует /mute от любого участника"
      - "  Повторный /protect продлевает защиту"
      - "  <b>/amute от админа обходит защиту</b>"
    time_formats: "Форматы времени: 30, 30m, 2h, 1d, 1h30m, 1d2h30m"
    admin_note: |
      Если цель — администратор, назначенный ботом (/op или /restore),
      мут временно снимает ей права.

  tag:
    header: "🏷 <b>Смена тега</b>"
    rows:
      - "  Себе: {cost_self}"
      - "  Участнику: {cost_member}"
      - "  Админу: {cost_admin}"
      - "  Макс. длина: {max_length} символов"
    clear_note: "  --clear — удалить тег"

  bj:
    header: "🃏 <b>Блекджек — дуэль</b>"
    rows:
      - "Дуэльная игра 1 на 1 со ставкой."
      - ""
      - "<b>Как играть:</b>"
      - "  /bj &lt;ставка&gt; — вызвать на дуэль"
      - "  Ставка: {bj_min}–{bj_max}"
      - "  Второй игрок принимает вызов кнопкой"
      - "  Первый ход определяется случайно"
      - ""
      - "<b>Стоимость карт:</b>"
      - "  2–10 — по номиналу"
      - "  J, Q, K — 10 очков"
      - "  A (туз) — 11 или 1 (автоматически снижается при переборе)"
      - ""
      - "<b>Правила:</b>"
      - "  Каждый игрок по очереди: «🃏 Ещё» или «🛑 Хватит»"
      - "  Набрал больше 21 — перебор 💥"
      - "  Набрал ровно 21 — автоматически «Хватит»"
      - "  Блекджек (21 с двух карт) бьёт обычные 21"
      - ""
      - "<b>Результат:</b>"
      - "  Победитель забирает весь банк (2× ставка)"
      - "  Ничья (равный счёт или оба перебрали) — ставки возвращаются"

  wordgame:
    header: "🔤 <b>Угадайка</b>"
    rows:
      - "Два режима игры на слова:"
      - ""
      - "<b>/word &lt;ставка&gt; &lt;время&gt;</b> — ты сам загадываешь слово."
      - "  Бот напишет тебе в ЛС и попросит ввести слово."
      - "  Ставка: {wg_min_bet}–{wg_max_bet}  |  Время: от {wg_min_dur}m до {wg_max_dur}m"
      - ""
      - "<b>/rword &lt;ставка&gt; &lt;время&gt;</b> — бот загадывает случайное слово."
      - "  Ничего вводить не надо — игра стартует сразу."
      - "  Ставка: 0–{rwg_max_bet}  |  Время: те же лимиты"
      - "  Длина слова: {rwg_min_len}–{rwg_max_len} букв (из словаря)"
      - ""
      - "<b>Как угадывать:</b>"
      - "  Ответь (reply) на игровое сообщение своим словом."
      - "  Слово должно быть той же длины, что загаданное."
      - "  Каждая неверная попытка стоит {attempt_cost} балл."
      - "  Победитель забирает всю ставку."
      - ""
      - "  Лимит /word: {wg_max_games} игры за {wg_window} ч."
      - "  Лимит /rword: {rwg_max_games} игры за {rwg_window} ч."

  ttt:
    header: "🎮 <b>Исчезающие крестики-нолики</b>"
    rows:
      - "Дуэльная игра 1 на 1 со ставкой."
      - ""
      - "<b>Как играть:</b>"
      - "  /ttt &lt;ставка&gt; — вызвать на дуэль"
      - "  Ставка: {ttt_min}–{ttt_max}"
      - "  Второй игрок принимает вызов кнопкой"
      - "  Первый ход определяется случайно"
      - ""
      - "<b>Правила:</b>"
      - "  Поле 3×3 — стандартные крестики-нолики"
      - "  Но у каждого игрока максимум <b>3 фигуры</b> на поле"
      - "  При постановке 4-й — самая старая <b>исчезает</b>"
      - "  Исчезающая фигура подсвечена: 🟥 / 🟧"
      - ""
      - "<b>Победа:</b>"
      - "  Собери 3 в ряд (по горизонтали, вертикали или диагонали)"
      - "  Победитель забирает весь банк (2× ставка)"
      - "  Ничья — ставки возвращаются"
      - ""
      - "<b>Обозначения:</b>"
      - "  ❌ — крестик  |  ⭕ — нолик"
      - "  🟥 — крестик, который исчезнет"
      - "  🟧 — нолик, который исчезнет"

  dice:
    header: "🎲 <b>Кубики и слоты</b>"
    rows:
      - "<b>/dice &lt;ставка&gt;</b> — кубики (дуэль 2+ игроков)"
      - "  Ставка: {dice_min}–{dice_max}"
      - "  Сбор: {dice_min_wait}–{dice_max_wait} сек."
      - "  Кто выбросит больше — забирает весь банк"
      - "  При ничье — ставки возвращаются"
      - ""
      - "<b>/slots &lt;ставка&gt;</b> — слоты (одиночная игра)"
      - "  Ставка: {slots_min}–{slots_max}"
      - "  Кулдаун: {slots_cooldown} мин."
      - "  Множители выигрыша:"
      - "  🍒🍒🍒 → ×5  |  🍋🍋🍋 → ×10"
      - "  🍊🍊🍊 → ×15  |  💎💎💎 → ×30 (джекпот)"

  poker:
    header: "🎰 <b>Долгожданный удар кочергой</b>"
    rows:
      - "Рулетка случайных дебаффов!"
      - ""
      - "<b>Как играть:</b>"
      - "  /poker — применить на себя"
      - "  /poker (reply) — применить на другого игрока"
      - "  Стоимость: {poker_cost}"
      - ""
      - "<b>Дебаффы (случайный):</b>"
      - "  🔇 Мут на {poker_mute_min} мин"
      - "  🚫 Запрет игр на {poker_gameban_min} мин"
      - "  💸 Потеря {poker_score_pct}% баланса"
      - ""
      - "<b>На себя:</b>"
      - "  Потерянные деньги уходят боту"
      - ""
      - "<b>На другого:</b>"
      - "  При потере баллов — ты крадёшь деньги (макс {poker_steal_pct}% от твоего баланса)"
      - "  Шанс {poker_backfire}% — дебафф ударит по тебе!"

  chatmode:
    header: "🔒 <b>Режимы чата</b>"
    rows:
      - "Платные режимы, влияющие на весь чат."
      - ""
      - "<b>/silence [мин]</b> — режим тишины"
      - "  Запрещает все сообщения в чате"
      - "  Стоимость: {silence_cost} / мин"
      - ""
      - "<b>/gif [мин]</b> — только гифки и стикеры"
      - "  Запрещает всё кроме гифок и стикеров"
      - "  Стоимость: {gif_cost} / мин"
      - ""
      - "<b>/chatmode off</b> — отключить активный режим"
      - "  Может отключить инициатор или админ"

  ai:
    header: "🤖 <b>AI-команды</b>"
    rows:
      - "<b>/llm &lt;вопрос&gt;</b> — спросить AI"
      - "  Лимит: {llm_daily_limit} запросов в сутки (на пользователя)"
      - ""
      - "<b>/search &lt;запрос&gt;</b> — поиск в интернете + AI-ответ"
      - "<b>/searchd &lt;запрос&gt;</b> — то же, но подробнее"
      - ""
      - "<b>/analyze [N|время] [@user ...]</b> — анализ переписки"
      - "  Примеры: /analyze 100 · /analyze 2h · /analyze 30m @user1"
      - ""
      - "<b>/wir [N|время]</b> — разбор конфликта: кто прав, вердикт"
      - "  Примеры: /wir · /wir 200 · /wir 1h"
      - ""
      - "<b>/anon</b> — анонимное сообщение в группу (пишите в ЛС боту)"

  commands:
    header: "📋 <b>Команды</b>"
    static_commands:
      - "<b>📊 Информация:</b>"
      - "  /score — твой счёт"
      - "  /score @user — счёт пользователя"
      - "  /top [N] — лидеры (отрицательное N = антирейтинг)"
      - "  /stats [@user] — статистика: счёт, лимиты, победы"
      - "  /history — история начислений"
      - "  /uhistory @user — история с участником"
      - "  /daily — лидерборд активности за сегодня"
      - "  /limits — текущие лимиты бота"
      - "  /updates — обновления бота"
      - ""
      - "<b>🎮 Игры:</b>"
      - "  /bj &lt;ставка&gt; — блекджек ({bj_min}–{bj_max})"
      - "  /ttt &lt;ставка&gt; — крестики-нолики ({ttt_min}–{ttt_max})"
      - "  /dice &lt;ставка&gt; — кубики ({dice_min}–{dice_max})"
      - "  /slots &lt;ставка&gt; — слоты ({slots_min}–{slots_max})"
      - "  /word &lt;ставка&gt; &lt;время&gt; — угадайка (ты загадываешь)"
      - "  /rword &lt;ставка&gt; &lt;время&gt; — угадайка (бот загадывает)"
      - "  /poker — удар кочергой ({poker_cost})"
      - "  /renew — сбросить лимиты за {renew_cost}"
      - "  /selfban &lt;время&gt; — запретить себе играть"
      - ""
      - "<b>🔇 Мут и теги:</b>"
      - "  /mute @user N — платный мут ({mute_min}–{mute_max} мин)"
      - "  /mute random N — замутить случайного участника"
      - "  /unmute @user — снять мут за кирчики"
      - "  /selfmute N — самомут ({selfmute_min}–{selfmute_max} мин)"
      - "  /protect — защита от /mute ({protection_hours} ч. за {protection_cost} б.)"
      - "  /unprotect — снять свою защиту"
      - "  /tag [тег] — сменить свой / чужой тег"
      - ""
      - "<b>💰 Экономика:</b>"
      - "  /transfer @user N — перевести баллы"
      - "  /buyop — купить титул ({buyop_cost})"
      - ""
      - "<b>🔒 Режимы чата:</b>"
      - "  /silence [мин] — режим тишины"
      - "  /gif [мин] — только гифки и стикеры"
      - "  /chatmode off — отключить режим"
      - ""
      - "<b>🤖 AI и прочее:</b>"
      - "  /llm &lt;вопрос&gt; — спросить AI"
      - "  /search &lt;запрос&gt; — поиск + AI"
      - "  /analyze [N|время] — анализ чата"
      - "  /wir [N|время] — разбор конфликта"
      - "  /anon — анонимное сообщение (в ЛС боту)"
      - "  /idea &lt;текст&gt; — предложить идею"
      - "  /bug · /feature · /report — обратная связь"
      - "  /help — эта справка"

  tracker:
    header: "📡 <b>Трекер</b>"
    rows:
      - "Репорты, фичи и баги уходят в отдельный чат с топиками."
      - ""
      - "<b>Настройка (только для админов):</b>"
      - "  1. Создай супергруп с топиками, добавь бота как админа"
      - "  2. Создай нужные топики (Баги, Фичи, Репорты, Changelog)"
      - "  3. В каждом топике напиши /settopic &lt;тип&gt;"
      - "     Типы: bug | feature | report | changelog"
      - "  4. В основной группе: /settracker &lt;tracker_chat_id&gt;"
      - "     ID трекера узнай командой /settracker в нём без аргументов"
      - ""
      - "<b>Ченджлог:</b>"
      - "  Пиши обновления прямо в changelog-топик трекера."
      - "  Первая строка = заголовок (напр. v1.3 · Угадайка)"
      - "  Редактирование и удаление сообщений работает."
      - "  /updates — показать список обновлений"

  admin:
    header: "🛡 <b>Команды для админов</b>"
    commands:
      - "  /add @user N — добавить N баллов"
      - "  /sub @user N — вычесть N баллов"
      - "  /set @user N — установить баллы"
      - "  /reset @user — обнулить баллы"
      - ""
      - "  /op @user — назначить модератором (через бота)"
      - "  /deop @user — снять с должности"
      - "  /amute @user N — мут без оплаты, обходит /protect"
      - "  /aunmute @user — снять мут досрочно (бесплатно)"
      - "  /save @user — сохранить права админа"
      - "  /restore @user — восстановить права ботом"
      - ""
      - "  /giveaway &lt;призы&gt; [время] — запустить розыгрыш"
      - "  /giveaway_end [ID] — завершить розыгрыш"
      - "  /giveaway_period &lt;призы&gt; &lt;интервал&gt; — периодический розыгрыш"
      - "  /giveaway_period_stop — остановить периодический"
      - "  /mutegiveaway &lt;мут&gt; &lt;кол-во&gt; &lt;сбор&gt; — мут-рулетка"
      - "  /mutegiveaway_end [ID] — завершить мут-рулетку"
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: scorebot
      POSTGRES_PASSWORD: scorebot
      POSTGRES_DB: scorebot
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scorebot"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        tag: "{{.Name}}"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        tag: "{{.Name}}"

  flyway:
    image: flyway/flyway:11
    depends_on:
      db:
        condition: service_healthy
    command: migrate
    volumes:
      - ./migrations:/flyway/sql:ro,z
    environment:
      FLYWAY_URL: jdbc:postgresql://db:5432/scorebot
      FLYWAY_USER: scorebot
      FLYWAY_PASSWORD: scorebot
    logging:
      driver: json-file
      options:
        tag: "{{.Name}}"

  openserp:
    image: karust/openserp
    restart: unless-stopped
    command: serve -a 0.0.0.0 -p 7000
    ports:
      - "127.0.0.1:7000:7000"
    logging:
      driver: json-file
      options:
        tag: "{{.Name}}"

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      flyway:
        condition: service_completed_successfully
      openserp:
        condition: service_started
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://scorebot:scorebot@db:5432/scorebot
      OPENSERP_URL: http://openserp:7000
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./configs:/app/configs:ro,z
    logging:
      driver: json-file
      options:
        tag: "{{.Name}}"

  # ── Observability ─────────────────────────────────────────────────────────

  loki:
    image: grafana/loki:3.4
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./loki-config.yml:/etc/loki/config.yml:ro,z
      - lokidata:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:3100/ready | grep -q ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:3.4
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro,z
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # needs access to Docker socket — runs as root
    user: root

  grafana:
    image: grafana/grafana:11.6.0
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./grafana-provisioning:/etc/grafana/provisioning:ro,z
      - grafanadata:/var/lib/grafana

volumes:
  pgdata:
  redisdata:
  lokidata:
  grafanadata: